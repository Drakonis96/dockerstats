version: "3.9"

networks:
  monitor-net:

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    restart: unless-stopped
    networks:
      - monitor-net
    ports:
      - "8080:8080"   # Expose cAdvisor on the host
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    command:
      - --docker_only=true
      - --housekeeping_interval=10s

  statainer:
    build: .
    container_name: statainer-test
    restart: unless-stopped
    depends_on:
      - cadvisor
    networks:
      - monitor-net
    ports:
      - "5001:5000"   # Expose the monitor app on the host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data:/app/data
    environment:
      #AUTH_USER: "admin"
      #AUTH_PASSWORD: "admin"
      LOGIN_MODE: "page"  # New: Login mode - 'popup' (default) or 'page'
      CADVISOR_URL: "http://cadvisor:8080"
      PUSHOVER_TOKEN: ${PUSHOVER_TOKEN}
      PUSHOVER_USER: ${PUSHOVER_USER}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      NTFY_SERVER_URL: ${NTFY_SERVER_URL:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      NTFY_USERNAME: ${NTFY_USERNAME:-}
      NTFY_PASSWORD: ${NTFY_PASSWORD:-}
      NTFY_TAGS: ${NTFY_TAGS:-}
      NTFY_MARKDOWN: ${NTFY_MARKDOWN:-false}
      GENERIC_WEBHOOK_URL: ${GENERIC_WEBHOOK_URL:-}
      GENERIC_WEBHOOK_METHOD: ${GENERIC_WEBHOOK_METHOD:-POST}
      GENERIC_WEBHOOK_HEADERS: ${GENERIC_WEBHOOK_HEADERS:-}
      GENERIC_WEBHOOK_CONTENT_TYPE: ${GENERIC_WEBHOOK_CONTENT_TYPE:-}
      GENERIC_WEBHOOK_BODY_TEMPLATE: ${GENERIC_WEBHOOK_BODY_TEMPLATE:-}
      NVIDIA_VISIBLE_DEVICES: all
      GPU_METRICS_ENABLED: "true"
      DOCKER_SOCKET_URL: ${DOCKER_SOCKET_URL:-unix:///var/run/docker.sock}
    # For hosts with an NVIDIA GPU and the NVIDIA Container Toolkit, you can uncomment the deploy/resources/devices section.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

# Secrets (optional)
# secrets:
#   auth_password:
#     file: ./auth_password.txt
