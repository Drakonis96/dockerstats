<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>statainer - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="icon" href="{{ url_for('static', filename='logo.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='login-modern.css') }}">
</head>
<body>
  <div id="login-background">
    <div class="login-container login-shell">
      <div class="login-form">
        <div class="login-brand text-center">
          <img src="{{ url_for('static', filename='logo.png') }}" alt="statainer" class="login-logo">
          <h1 class="login-title">statainer</h1>
        </div>
        <p class="login-subtitle">Monitoriza, actua y revisa alertas del host Docker desde una sola vista.</p>
        <div class="text-center mb-2" style="font-size:0.9rem; color:#ccc; margin-top:-4px; margin-bottom:18px;">
          by <a href="https://github.com/Drakonis96" target="_blank" style="color:#bbaaff; text-decoration:underline; font-size:0.9em;">Drakonis96</a>
        </div>
        {% if error %}
        <div class="alert alert-danger" role="alert">
          {{ error }}
        </div>
        {% endif %}
        <form method="POST" action="{{ url_for('main_routes.login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
          <div class="mb-3">
            <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
          </div>
          <div class="mb-3">
            <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
          </div>
          <button type="submit" class="btn btn-login">Login</button>
        </form>
        <div class="login-meta">
          <span class="login-pill">Live metrics</span>
          <span class="login-pill">Container actions</span>
          <span class="login-pill">Notification checks</span>
        </div>
      </div>
    </div>
    <div style="position:fixed; left:0; right:0; bottom:0; z-index:10; pointer-events:none;">
      <div style="width:100%; text-align:center; margin-bottom:18px;">
        <span style="background:rgba(0,0,0,0.55); color:#fff; font-weight:bold; font-size:1.1rem; padding:6px 18px; border-radius:8px; pointer-events:auto;">statainer. Version {{ app_version }}</span>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
